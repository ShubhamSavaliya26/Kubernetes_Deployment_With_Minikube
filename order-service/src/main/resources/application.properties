spring.application.name=order-service
server.port=8082

spring.datasource.url=jdbc:h2:mem:orderdb
spring.h2.console.enabled=true

product.service.url=${PRODUCT_SERVICE_URL:http://product-service:8080/api/products}

logging.level.root=INFO
logging.pattern.console=%d{HH:mm:ss} %-5level [%X{correlationId}] %logger{36} - %msg%n

management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.health.show-details=always
management.prometheus.metrics.export.enabled=true
management.info.env.enabled=true
management.tracing.sampling.probability=1.0
management.tracing.export.zipkin.endpoint=http://zipkin:9411/api/v2/spans